<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi panel - Lojanova</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="admin/css/admin.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app producer-app">
  <aside class="sidebar">
    <div class="logo">Loja<span>nova</span></div>
    <nav>
      <a href="#productos" class="nav-link active"><i data-lucide="package" class="icon"></i> Mis productos</a>
      <a href="#perfil" class="nav-link"><i data-lucide="user-round" class="icon"></i> Mi perfil</a>
    </nav>
    <a href="index.html" class="logout" target="_blank"><i data-lucide="external-link" class="icon"></i> Ver sitio publico</a>
    <button class="logout" id="btnLogout"><i data-lucide="log-out" class="icon"></i> Cerrar sesion</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <div>
        <h1>Mi panel</h1>
        <p><span id="producerName">Productor</span> - <span id="producerBusiness">Emprendimiento</span></p>
      </div>
      <button class="btn btn-primary auto-width" id="btnNuevoProducto"><i data-lucide="plus" class="icon"></i> Nuevo producto</button>
    </div>

    <div class="success-msg panel-message" id="statusBox"></div>

    <div class="kpi-grid producer-kpis">
      <div class="kpi-card"><div class="kpi-num" id="kpiProductos">0</div><div class="kpi-label">Mis productos</div></div>
      <div class="kpi-card"><div class="kpi-num" id="kpiPublicados">0</div><div class="kpi-label">Publicados</div></div>
    </div>

    <section id="productos" class="panel panel-section">
      <div class="panel-title"><h3>Mis productos</h3></div>
      <table>
        <thead><tr><th></th><th>Nombre</th><th>Categoria</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tablaProductos"><tr class="empty-row"><td colspan="5">Cargando...</td></tr></tbody>
      </table>
    </section>

    <section class="panel panel-section" id="productFormPanel">
      <div class="panel-title"><h3 id="productFormTitle">Nuevo producto</h3></div>
      <form id="productForm">
        <input type="hidden" id="productoId">
        <div class="form-grid">
          <div class="field full"><label>Nombre del producto *</label><input type="text" id="productoNombre" required></div>
          <div class="field"><label>Categoria *</label><select id="productoCategoria" required></select></div>
          <div class="field"><label>Canton *</label><select id="productoCanton" required></select></div>
          <div class="field full"><label>Descripcion corta</label><textarea id="productoDescCorta" maxlength="160"></textarea></div>
          <div class="field full"><label>Descripcion extensa</label><textarea id="productoDescLarga"></textarea></div>
          <div class="field full"><label>Proceso de elaboracion</label><textarea id="productoProceso"></textarea></div>
          <div class="field"><label>Ingredientes / materiales</label><input type="text" id="productoIngredientes"></div>
          <div class="field"><label>Presentacion</label><input type="text" id="productoPresentacion"></div>
          <div class="field"><label>Disponibilidad</label><input type="text" id="productoDisponibilidad"></div>
          <div class="field"><label>Mercados</label><input type="text" id="productoMercados"></div>
          <div class="field full"><label>Etiquetas separadas por coma</label><input type="text" id="productoEtiquetas"></div>
          <div class="field full"><label>URL de imagen principal</label><input type="text" id="productoImagen" placeholder="https://..."></div>
          <div class="field full">
            <div class="checkbox-row"><input type="checkbox" id="productoArtesanal"><label for="productoArtesanal">Producto artesanal</label></div>
            <div class="checkbox-row" style="margin-top:8px"><input type="checkbox" id="productoExportacion"><label for="productoExportacion">Producto de exportacion</label></div>
            <div class="checkbox-row" style="margin-top:8px"><input type="checkbox" id="productoActivo" checked><label for="productoActivo">Publicado</label></div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="btnCancelarProducto">Limpiar</button>
          <button type="submit" class="btn btn-primary auto-width">Guardar producto</button>
        </div>
      </form>
    </section>

    <section id="perfil" class="panel panel-section">
      <div class="panel-title"><h3>Mi informacion</h3></div>
      <form id="profileForm">
        <div class="form-grid">
          <div class="field"><label>Nombre completo *</label><input type="text" id="perfilNombre" required></div>
          <div class="field"><label>Nombre del emprendimiento *</label><input type="text" id="perfilEmprendimiento" required></div>
          <div class="field"><label>Canton</label><select id="perfilCanton"></select></div>
          <div class="field"><label>Anios de experiencia</label><input type="number" id="perfilAnios" min="0"></div>
          <div class="field full"><label>Historia</label><textarea id="perfilHistoria"></textarea></div>
          <div class="field"><label>Telefono</label><input type="text" id="perfilTelefono"></div>
          <div class="field"><label>WhatsApp</label><input type="text" id="perfilWhatsapp" placeholder="593999999999"></div>
          <div class="field"><label>Correo de contacto</label><input type="email" id="perfilCorreo"></div>
          <div class="field"><label>Ubicacion</label><input type="text" id="perfilUbicacion"></div>
          <div class="field"><label>Facebook</label><input type="text" id="perfilFacebook"></div>
          <div class="field"><label>Instagram</label><input type="text" id="perfilInstagram"></div>
          <div class="field full"><label>URL de fotografia</label><input type="text" id="perfilFoto" placeholder="https://..."></div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary auto-width">Guardar perfil</button>
        </div>
      </form>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/mi-panel.js"></script>
</body>
</html>
