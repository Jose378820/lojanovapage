<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso administrador — Lojanova</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-screen">
  <div class="login-card">
    <div class="logo">Loja<span>nova</span></div>
    <p class="sub">Panel de administración</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" required autocomplete="username" placeholder="admin@lojanova.gob.ec">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Ingresar</button>
    </form>
    <p style="text-align:center;margin-top:22px;font-size:.82rem"><a href="../index.html" style="color:var(--verde-bosque)">← Volver al sitio público</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
<script>
// Si ya hay sesión activa y es admin, redirige directo al dashboard
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session){
    const { data: perfil } = await db.from("admins").select("id").eq("id", session.user.id).maybeSingle();
    if (perfil) location.href = "dashboard.html";
  }
})();

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");
const loginBtn = document.getElementById("loginBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.style.display = "none";
  loginBtn.textContent = "Ingresando…";
  loginBtn.disabled = true;

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error){
    errorMsg.textContent = "Correo o contraseña incorrectos.";
    errorMsg.style.display = "block";
    loginBtn.textContent = "Ingresar";
    loginBtn.disabled = false;
    return;
  }

  const { data: perfil } = await db.from("admins").select("id").eq("id", data.user.id).maybeSingle();
  if (!perfil){
    errorMsg.textContent = "Esta cuenta no tiene permisos de administrador. Contacta al equipo técnico.";
    errorMsg.style.display = "block";
    await db.auth.signOut();
    loginBtn.textContent = "Ingresar";
    loginBtn.disabled = false;
    return;
  }

  location.href = "dashboard.html";
});
</script>
</body>
</html>
