<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso productor - Lojanova</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="admin/css/admin.css">
</head>
<body>

<div class="login-screen">
  <div class="login-card">
    <div class="logo">Loja<span>nova</span></div>
    <p class="sub">Portal del productor</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="authForm" data-mode="login">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" required autocomplete="username" placeholder="juan@gmail.com">
      </div>
      <div class="field">
        <label for="password">Contrasena</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Ingresar</button>
    </form>
    <p style="text-align:center;margin-top:22px;font-size:.82rem">No tienes cuenta? <a href="registro.html" style="color:var(--verde-bosque);font-weight:700">Registrate</a></p>
    <p style="text-align:center;margin-top:10px;font-size:.82rem"><a href="index.html" style="color:var(--verde-bosque)">Volver al sitio publico</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/productor-auth.js"></script>
</body>
</html>
