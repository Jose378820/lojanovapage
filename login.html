<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso productor - Lojanova</title>
<link rel="stylesheet" href="admin/css/admin.css">
</head>
<body>

<div class="login-screen">
  <div class="login-card">
    <div class="logo">Loja<span>nova</span></div>
    <p class="sub">Portal del productor</p>

    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <form id="authForm">
      <div class="field">
        <label>Correo</label>
        <input type="email" id="email" required autocomplete="username">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Ingresar</button>
    </form>

    <p style="text-align:center;margin-top:22px;font-size:.82rem">
      ¿No tienes cuenta?
      <a href="registro.html" style="color:var(--verde-bosque);font-weight:700">Regístrate</a>
    </p>

    <p style="text-align:center;margin-top:10px;font-size:.82rem">
      <a href="index.html" style="color:var(--verde-bosque)">Volver al sitio público</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://pfdyxxavadiyoaxduibp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sz0f8pdxD7zLaKqx1xykfQ_MGZN7h6y";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("authForm");
const errorMsg = document.getElementById("errorMsg");
const submitBtn = document.getElementById("submitBtn");

function showError(message) {
  errorMsg.textContent = message;
  errorMsg.style.display = "block";
}

async function ensureProducerProfile(user) {
  const { data: existingProfile, error: readError } = await db
    .from("emprendedores")
    .select("id")
    .eq("auth_user_id", user.id)
    .maybeSingle();

  if (readError) throw readError;
  if (existingProfile) return existingProfile;

  const fallbackName = user.user_metadata?.nombre || user.email.split("@")[0];
  const fallbackBusiness = user.user_metadata?.emprendimiento || "Emprendimiento sin nombre";

  const { data: createdProfile, error: createError } = await db
    .from("emprendedores")
    .insert({
      auth_user_id: user.id,
      nombre: fallbackName,
      emprendimiento: fallbackBusiness,
      correo: user.email,
      activo: true
    })
    .select("id")
    .single();

  if (createError) throw createError;
  return createdProfile;
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();

  errorMsg.style.display = "none";
  submitBtn.disabled = true;
  submitBtn.textContent = "Ingresando...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const { data, error } = await db.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      showError(error.message || "Correo o contraseña incorrectos.");
      return;
    }

    const { data: admin } = await db
      .from("admins")
      .select("id")
      .eq("id", data.user.id)
      .maybeSingle();

    if (admin) {
      await db.auth.signOut();
      showError("Esta cuenta es administradora. Ingresa desde admin/index.html.");
      return;
    }

    await ensureProducerProfile(data.user);

    window.location.href = "mi-panel.html";

  } catch (error) {
    showError(error.message || "No se pudo iniciar sesión.");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Ingresar";
  }
});
</script>

</body>
</html>
